# Applies `supabase/migrations` to the linked Supabase project via the CLI (`db push`).
#
# Repo secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN — create at https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   — Project Settings → General → Reference ID (e.g. cxegiairrptsbaogkmqf)
#   SUPABASE_DB_PASSWORD     — Project Settings → Database → Database password (for Postgres)
#
# Local: `npm run db:link` (once) then `npm run db:push`

name: Supabase db push

on:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-db-push.yml"
  workflow_dispatch:

concurrency:
  group: supabase-db-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then echo "Missing secret SUPABASE_ACCESS_TOKEN"; exit 1; fi
          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then echo "Missing secret SUPABASE_DB_PASSWORD"; exit 1; fi
          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then echo "Missing secret SUPABASE_PROJECT_REF"; exit 1; fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes
          supabase db push --yes
